<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Empleados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📋 Gestión de Empleados</h1>
        
        <div class="form-container">
            <h2>Agregar / Editar Empleado</h2>
            <form id="empleadoForm">
                <input type="hidden" id="id" value="">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Nombre completo" required>
                </div>
                <div class="form-group">
                    <label for="sector">Sector</label>
                    <input type="text" id="sector" placeholder="Sector" required>
                </div>
                <div class="form-group">
                    <label for="anio">Años de experiencia</label>
                    <input type="number" id="anio" placeholder="Años" required min="1">
                </div>
                <div class="form-actions">
                    <button type="submit" id="saveBtn">Guardar</button>
                    <button type="button" id="cancelBtn" style="display:none;">Cancelar</button>
                </div>
            </form>
        </div>

        <div class="list-container">
            <h2>Lista de Empleados</h2>
            <table id="empleadosTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Sector</th>
                        <th>Años</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="empleadosBody">
                    <!-- Filas generadas por JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
